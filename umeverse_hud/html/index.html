<!DOCTYPE html>
<html lang="en" style="background:transparent!important">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
</head>
<body style="background:transparent!important">
<div id="hud-wrapper">

    <!-- ════════════ Status HUD (always visible on foot & in vehicle) ════════════ -->
    <div id="status-hud" class="hud-element" data-element="status">
        <!-- Health -->
        <div class="status-ring" id="health-container">
            <svg viewBox="0 0 48 48">
                <circle class="ring-bg" cx="24" cy="24" r="18"/>
                <circle class="ring-fill" id="health-fill" cx="24" cy="24" r="18"/>
            </svg>
            <div class="ring-icon">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
        </div>
        <!-- Armor -->
        <div class="status-ring" id="armor-container">
            <svg viewBox="0 0 48 48">
                <circle class="ring-bg" cx="24" cy="24" r="18"/>
                <circle class="ring-fill" id="armor-fill" cx="24" cy="24" r="18"/>
            </svg>
            <div class="ring-icon">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                </svg>
            </div>
        </div>
        <!-- Hunger -->
        <div class="status-ring" id="hunger-container">
            <svg viewBox="0 0 48 48">
                <circle class="ring-bg" cx="24" cy="24" r="18"/>
                <circle class="ring-fill" id="hunger-fill" cx="24" cy="24" r="18"/>
            </svg>
            <div class="ring-icon">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path fill="currentColor" d="M18.06 23h1.66c.84 0 1.53-.65 1.63-1.48L23 5.05h-5V1h-2v4.05h-5l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29V23zM1 22v1h16v-1c0-.55-.45-1-1-1H2c-.55 0-1 .45-1 1zm15-4c0-5-3.47-6-8.5-6S0 13 0 18v2h16v-2z"/>
                </svg>
            </div>
        </div>
        <!-- Thirst -->
        <div class="status-ring" id="thirst-container">
            <svg viewBox="0 0 48 48">
                <circle class="ring-bg" cx="24" cy="24" r="18"/>
                <circle class="ring-fill" id="thirst-fill" cx="24" cy="24" r="18"/>
            </svg>
            <div class="ring-icon">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path fill="currentColor" d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8z"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- ════════════ Custom Minimap (compass + street info) ════════════ -->
    <div id="minimap-hud" class="hud-element" data-element="minimap">
        <div class="minimap-container">
            <!-- Compass ring (rotates with heading) -->
            <svg class="compass-ring" viewBox="0 0 200 200" id="compass-svg">
                <!-- Outer ring -->
                <circle cx="100" cy="100" r="94" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
                <!-- Tick marks generated by JS -->
                <g id="compass-ticks"></g>
                <!-- Cardinal labels -->
                <text id="compass-N" x="100" y="18" text-anchor="middle" dominant-baseline="central" class="cardinal cardinal-n">N</text>
                <text id="compass-E" x="186" y="100" text-anchor="middle" dominant-baseline="central" class="cardinal">E</text>
                <text id="compass-S" x="100" y="186" text-anchor="middle" dominant-baseline="central" class="cardinal">S</text>
                <text id="compass-W" x="14" y="100" text-anchor="middle" dominant-baseline="central" class="cardinal">W</text>
            </svg>
            <!-- Player direction indicator (always points up, compass rotates) -->
            <div class="player-indicator">
                <svg viewBox="0 0 24 24" width="22" height="22">
                    <polygon points="12,2 6,18 12,14 18,18" fill="#6478ff" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
                </svg>
            </div>
            <!-- Heading readout -->
            <div class="heading-readout" id="heading-text">0&deg;</div>
        </div>
        <!-- Street & zone info below minimap -->
        <div class="minimap-info">
            <div class="minimap-street" id="street-text">Loading...</div>
            <div class="minimap-zone" id="zone-text"></div>
        </div>
    </div>

    <!-- ════════════ Vehicle Instrument Cluster ════════════ -->
    <div id="vehicle-hud" class="hud-element hidden" data-element="vehicle">
        <div class="cluster-panel">

            <!-- RPM Gauge (left) -->
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 200 200">
                    <circle class="redline-zone" cx="100" cy="100" r="80"/>
                    <circle class="gauge-track"  cx="100" cy="100" r="80"/>
                    <circle class="gauge-fill"   cx="100" cy="100" r="80" id="rpm-fill"/>
                    <g id="rpm-ticks"></g>
                </svg>
                <div class="gauge-center">
                    <div class="gauge-value" id="rpm-text">0</div>
                    <div class="gauge-label">RPM</div>
                </div>
            </div>

            <!-- Speedometer column (indicators above + gauge) -->
            <div class="speedo-column">
                <div class="cluster-indicators">
                    <div class="indicator off" id="seatbelt-indicator" title="Seatbelt">
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <path fill="currentColor" d="M12 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm5 9.5a1.5 1.5 0 0 0-3 0v4a1.5 1.5 0 0 0 3 0v-4zm-7.5-.29 2.19 2.19a.75.75 0 0 0 1.06 0l2.19-2.19c.47-.47.14-1.28-.53-1.28H13.5V9h-3v4.93h-.91c-.67 0-1 .81-.53 1.28zM7 15.5v4a1.5 1.5 0 0 0 3 0v-4a1.5 1.5 0 0 0-3 0z"/>
                        </svg>
                    </div>
                    <div class="indicator off" id="engine-indicator" title="Engine">
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <path fill="currentColor" d="M7 15v-4.81l4-3.6V4h2v2.59l4 3.6V15h3v2h-3l-2 2H9l-2-2H4v-2h3zm2-1h6v-3.91l-3-2.7-3 2.7V14z"/>
                        </svg>
                    </div>
                </div>
                <div class="gauge-container speedo-gauge-container">
                    <svg class="gauge-svg" viewBox="0 0 200 200">
                        <circle class="gauge-track"  cx="100" cy="100" r="80"/>
                        <circle class="gauge-fill speedo-fill" cx="100" cy="100" r="80" id="speed-fill"/>
                        <g id="speed-ticks"></g>
                    </svg>
                    <div class="gauge-center speedo-center">
                        <div class="speed-display">
                            <span class="speed-value" id="speed-text">0</span>
                            <span class="speed-unit" id="speed-unit">MPH</span>
                        </div>
                        <div class="gear-display">
                            <span class="gear-label">GEAR</span>
                            <span class="gear-value" id="gear-text">N</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Fuel Gauge (right) -->
            <div class="gauge-container fuel-gauge-container">
                <svg class="gauge-svg" viewBox="0 0 200 200">
                    <circle class="gauge-track" cx="100" cy="100" r="80"/>
                    <circle class="gauge-fill fuel-fill" cx="100" cy="100" r="80" id="fuel-fill"/>
                    <g id="fuel-ticks"></g>
                </svg>
                <div class="gauge-center">
                    <div class="gauge-value" id="fuel-text">100</div>
                    <div class="gauge-label">FUEL</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ════════════ HUD Settings Panel ════════════ -->
    <div id="hud-settings" class="hidden">
        <div class="settings-panel">
            <div class="settings-header">
                <h2>&#9881; HUD Settings</h2>
                <button class="settings-close" id="settings-close">&times;</button>
            </div>
            <div class="settings-body">
                <div class="settings-section">
                    <h3>Speed Unit</h3>
                    <div class="toggle-group">
                        <button class="toggle-btn active" id="btn-mph" data-unit="mph">MPH</button>
                        <button class="toggle-btn" id="btn-kmh" data-unit="kmh">KM/H</button>
                    </div>
                </div>
                <div class="settings-section">
                    <h3>Visible Elements</h3>
                    <label class="chk-label"><input type="checkbox" id="chk-health"  checked> Health</label>
                    <label class="chk-label"><input type="checkbox" id="chk-armor"   checked> Armor</label>
                    <label class="chk-label"><input type="checkbox" id="chk-hunger"  checked> Hunger</label>
                    <label class="chk-label"><input type="checkbox" id="chk-thirst"  checked> Thirst</label>
                    <label class="chk-label"><input type="checkbox" id="chk-vehicle" checked> Vehicle Cluster</label>
                    <label class="chk-label"><input type="checkbox" id="chk-minimap" checked> Minimap (Compass)</label>
                </div>
                <div class="settings-section">
                    <h3>Element Sizes</h3>
                    <div class="slider-row">
                        <span class="slider-label">Status Rings</span>
                        <input type="range" id="scale-status" min="50" max="200" value="100" step="5">
                        <span class="slider-value" id="scale-status-val">100%</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Vehicle Cluster</span>
                        <input type="range" id="scale-vehicle" min="50" max="200" value="100" step="5">
                        <span class="slider-value" id="scale-vehicle-val">100%</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Minimap</span>
                        <input type="range" id="scale-minimap" min="50" max="200" value="100" step="5">
                        <span class="slider-value" id="scale-minimap-val">100%</span>
                    </div>
                </div>
                <div class="settings-section">
                    <h3>Layout</h3>
                    <button class="settings-btn" id="btn-drag">&#128256; Enable Drag Mode</button>
                    <button class="settings-btn secondary" id="btn-reset">&#8617; Reset All</button>
                </div>
            </div>
            <div class="settings-footer">
                <button class="settings-btn primary" id="btn-save">Save &amp; Close</button>
            </div>
        </div>
    </div>

    <!-- Floating hint shown during drag mode -->
    <div id="drag-hint" class="hidden">
        <p>Drag HUD elements to reposition &bull; Scroll wheel to resize</p>
        <button id="btn-done-drag">&#10003; Done Editing</button>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>

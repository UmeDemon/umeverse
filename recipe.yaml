$engine: 2
$onesync: on
$minFxVersion: 5848
$minTxAdminVersion: 7.0.0

name: Umeverse Framework
version: 1.0.0
author: Umeverse
description: |
  A complete custom FiveM RP framework with economy, inventory, vehicles,
  banking, admin panel, weather sync, appearance editor, and full QBCore/ESX/TMC
  compatibility bridges. Built with Lua + JS NUI on oxmysql.

variables:
  svLicense:
    label: "Server License Key (from keymaster.fivem.net)"
  svHostname:
    label: "Server Name"
    default: "Umeverse RP"
  svMaxClients:
    label: "Max Players"
    default: "64"
  dbConnection:
    label: "MySQL Connection String"
    default: "mysql://root:password@localhost/umeverse?charset=utf8mb4"
  ownerIdentifier:
    label: "Your FiveM License Identifier (type 'status' in console to find)"
    default: "license:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  identifierType:
    label: "Player Identifier Type"
    default: "license"
    options:
      - label: "FiveM License (recommended)"
        value: "license"
      - label: "Steam"
        value: "steam"
      - label: "Discord"
        value: "discord"
  steamWebApiKey:
    label: "Steam Web API Key (required only if using Steam identifier, leave blank otherwise)"
    default: ""
  discordWebhook:
    label: "Discord Webhook URL for admin/server logs (optional, leave blank to disable)"
    default: ""
  installPmaVoice:
    label: "Install pma-voice (proximity voice chat)?"
    default: "yes"
    options:
      - label: "Yes"
        value: "yes"
      - label: "No"
        value: "no"
  installOxLib:
    label: "Install ox_lib (utility library for third-party scripts)?"
    default: "yes"
    options:
      - label: "Yes"
        value: "yes"
      - label: "No"
        value: "no"
  bridgeType:
    label: "Compatibility Bridge (for third-party scripts)"
    default: "none"
    options:
      - label: "None"
        value: "none"
      - label: "QBCore / QBox"
        value: "qb"
      - label: "ESX"
        value: "esx"
      - label: "TMC (The Mob City)"
        value: "tmc"

tasks:
  ##############################################
  # STEP 1 — Download & Extract
  ##############################################
  - action: waste_time
    seconds: 5
    message: "Setting up Umeverse Framework..."

  # ─── Download cfx-server-data (default FiveM resources) ───
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    dest: ./tmp/cfx-server-data

  - action: move_path
    src: ./tmp/cfx-server-data/resources
    dest: ./resources/[cfx-default]

  # ─── Download oxmysql (release build) ───
  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip
    dest: ./tmp/oxmysql.zip

  - action: unzip
    src: ./tmp/oxmysql.zip
    dest: ./resources/oxmysql

  # ─── Download pma-voice (conditional) ───
  - action: download_file
    url: https://github.com/AvarianKnight/pma-voice/releases/latest/download/pma-voice.zip
    dest: ./tmp/pma-voice.zip
    condition:
      value: "{{installPmaVoice}}"
      operator: "=="
      expected: "yes"

  - action: unzip
    src: ./tmp/pma-voice.zip
    dest: ./resources/pma-voice
    condition:
      value: "{{installPmaVoice}}"
      operator: "=="
      expected: "yes"

  # ─── Download ox_lib (conditional) ───
  - action: download_file
    url: https://github.com/overextended/ox_lib/releases/latest/download/ox_lib.zip
    dest: ./tmp/ox_lib.zip
    condition:
      value: "{{installOxLib}}"
      operator: "=="
      expected: "yes"

  - action: unzip
    src: ./tmp/ox_lib.zip
    dest: ./resources/ox_lib
    condition:
      value: "{{installOxLib}}"
      operator: "=="
      expected: "yes"

  # ─── Download Umeverse Framework ───
  - action: download_github
    src: https://github.com/umedemon/umeverse
    ref: main
    dest: ./tmp/umeverse

  - action: move_path
    src: ./tmp/umeverse/umeverse_core
    dest: ./resources/umeverse_core

  - action: move_path
    src: ./tmp/umeverse/umeverse_inventory
    dest: ./resources/umeverse_inventory

  - action: move_path
    src: ./tmp/umeverse/umeverse_banking
    dest: ./resources/umeverse_banking

  - action: move_path
    src: ./tmp/umeverse/umeverse_vehicles
    dest: ./resources/umeverse_vehicles

  - action: move_path
    src: ./tmp/umeverse/umeverse_admin
    dest: ./resources/umeverse_admin

  - action: move_path
    src: ./tmp/umeverse/umeverse_weathersync
    dest: ./resources/umeverse_weathersync

  - action: move_path
    src: ./tmp/umeverse/umeverse_appearance
    dest: ./resources/umeverse_appearance

  - action: move_path
    src: ./tmp/umeverse/umeverse_bridge_qb
    dest: ./resources/umeverse_bridge_qb

  - action: move_path
    src: ./tmp/umeverse/umeverse_bridge_esx
    dest: ./resources/umeverse_bridge_esx

  - action: move_path
    src: ./tmp/umeverse/umeverse_bridge_tmc
    dest: ./resources/umeverse_bridge_tmc

  # ─── Cleanup temp files ───
  - action: remove_path
    dest: ./tmp

  - action: waste_time
    seconds: 3
    message: "Resources downloaded. Configuring framework..."

  ##############################################
  # STEP 2 — Inject configuration values
  ##############################################

  # ─── Set identifier type in core config ───
  - action: replace_string
    file: ./resources/umeverse_core/config.lua
    search: "UmeConfig.IdentifierType = 'license'"
    replace: "UmeConfig.IdentifierType = '{{identifierType}}'"

  # ─── Set Discord webhook in core config ───
  - action: replace_string
    file: ./resources/umeverse_core/config.lua
    search: "UmeConfig.LogWebhook = ''"
    replace: "UmeConfig.LogWebhook = '{{discordWebhook}}'"

  - action: waste_time
    seconds: 2
    message: "Configuration injected. Writing server config..."

  ##############################################
  # STEP 3 — Generate server.cfg
  ##############################################
  - action: write_file
    dest: ./server.cfg
    content: |
      # ╔══════════════════════════════════════════════════════════════╗
      # ║          Umeverse Framework - Server Configuration          ║
      # ║          Generated by txAdmin Recipe                        ║
      # ╚══════════════════════════════════════════════════════════════╝

      # Server Identity
      sv_hostname "{{svHostname}}"
      sv_projectName "{{svHostname}}"
      sv_projectDesc "A custom FiveM RP server powered by Umeverse Framework"
      sets sv_projectName "{{svHostname}}"
      sets tags "roleplay, custom, umeverse"
      sets locale "en-US"
      sv_maxclients {{svMaxClients}}
      sv_endpointPrivacy true
      sv_scriptHookAllowed 0

      # License Key
      sv_licenseKey "{{svLicense}}"

      # Steam Web API Key (leave empty if not using Steam identifiers)
      set steam_webApiKey "{{steamWebApiKey}}"

      # OneSync (REQUIRED for Umeverse)
      set onesync on

      # Database Connection
      set mysql_connection_string "{{dbConnection}}"

      # ─── FiveM Default Resources ───
      ensure mapmanager
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure hardcap

      # ─── Database Driver ───
      ensure oxmysql

      # ─── Optional: Proximity Voice Chat ───
      #ensure pma-voice

      # ─── Optional: Utility Library ───
      #ensure ox_lib

      # ─── Umeverse Framework (ORDER MATTERS) ───
      ensure umeverse_core
      ensure umeverse_inventory
      ensure umeverse_banking
      ensure umeverse_vehicles
      ensure umeverse_admin
      ensure umeverse_weathersync
      ensure umeverse_appearance

      # ─── Compatibility Bridge ───
      # (Managed by recipe — the selected bridge is auto-enabled below)

      # ─── Your Additional Scripts ───
      # ensure your_script_here

      # ─── Admin Permissions (ACE) ───
      add_ace identifier.{{ownerIdentifier}} umeverse.owner allow
      add_ace umeverse.owner umeverse.superadmin allow
      add_ace umeverse.superadmin umeverse.admin allow
      add_ace umeverse.admin umeverse.moderator allow

  # ─── Enable pma-voice if selected ───
  - action: replace_string
    file: ./server.cfg
    search: "#ensure pma-voice"
    replace: "ensure pma-voice"
    condition:
      value: "{{installPmaVoice}}"
      operator: "=="
      expected: "yes"

  # ─── Enable ox_lib if selected ───
  - action: replace_string
    file: ./server.cfg
    search: "#ensure ox_lib"
    replace: "ensure ox_lib"
    condition:
      value: "{{installOxLib}}"
      operator: "=="
      expected: "yes"

  # ─── Enable QBCore bridge if selected ───
  - action: append_string
    file: ./server.cfg
    search: "# (Managed by recipe"
    append: "\n      ensure umeverse_bridge_qb    # QBCore / QBox compatibility"
    condition:
      value: "{{bridgeType}}"
      operator: "=="
      expected: "qb"

  # ─── Enable ESX bridge if selected ───
  - action: append_string
    file: ./server.cfg
    search: "# (Managed by recipe"
    append: "\n      ensure umeverse_bridge_esx   # ESX compatibility"
    condition:
      value: "{{bridgeType}}"
      operator: "=="
      expected: "esx"

  # ─── Enable TMC bridge if selected ───
  - action: append_string
    file: ./server.cfg
    search: "# (Managed by recipe"
    append: "\n      ensure umeverse_bridge_tmc   # TMC (The Mob City) compatibility"
    condition:
      value: "{{bridgeType}}"
      operator: "=="
      expected: "tmc"

  - action: waste_time
    seconds: 2
    message: "Server config written. Setting up database..."

  ##############################################
  # STEP 4 — Database Setup
  ##############################################
  - action: connect_database
    name: umeverse
    connection_string: "{{dbConnection}}"

  - action: query_database
    query: |
      CREATE TABLE IF NOT EXISTS `umeverse_players` (
          `id`            INT(11)         NOT NULL AUTO_INCREMENT,
          `identifier`    VARCHAR(64)     NOT NULL,
          `citizenid`     VARCHAR(50)     NOT NULL,
          `firstname`     VARCHAR(50)     DEFAULT '',
          `lastname`      VARCHAR(50)     DEFAULT '',
          `charinfo`      LONGTEXT        DEFAULT '{}',
          `money`         LONGTEXT        DEFAULT '{"cash":5000,"bank":10000,"black":0}',
          `job`           LONGTEXT        DEFAULT '{"name":"unemployed","label":"Unemployed","grade":0,"gradelabel":"Freelancer","onduty":false}',
          `position`      LONGTEXT        DEFAULT '{"x":-269.4,"y":-955.3,"z":31.2,"heading":205.0}',
          `inventory`     LONGTEXT        DEFAULT '[]',
          `status`        LONGTEXT        DEFAULT '{"hunger":100,"thirst":100,"stress":0}',
          `skin`          LONGTEXT        DEFAULT '{}',
          `metadata`      LONGTEXT        DEFAULT '{}',
          `is_dead`       TINYINT(1)      DEFAULT 0,
          `last_login`    TIMESTAMP       DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
          `created_at`    TIMESTAMP       DEFAULT CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`),
          UNIQUE KEY `uk_citizenid` (`citizenid`),
          KEY `idx_identifier` (`identifier`)
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

  - action: query_database
    query: |
      CREATE TABLE IF NOT EXISTS `umeverse_bans` (
          `id`            INT(11)         NOT NULL AUTO_INCREMENT,
          `identifier`    VARCHAR(64)     DEFAULT NULL,
          `citizenid`     VARCHAR(50)     DEFAULT NULL,
          `reason`        TEXT            DEFAULT NULL,
          `banned_by`     VARCHAR(100)    DEFAULT 'System',
          `permanent`     TINYINT(1)      DEFAULT 0,
          `expires`       DATETIME        DEFAULT NULL,
          `created_at`    TIMESTAMP       DEFAULT CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`),
          KEY `idx_ban_identifier` (`identifier`),
          KEY `idx_ban_citizenid` (`citizenid`)
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

  - action: query_database
    query: |
      CREATE TABLE IF NOT EXISTS `umeverse_vehicles` (
          `id`            INT(11)         NOT NULL AUTO_INCREMENT,
          `citizenid`     VARCHAR(50)     NOT NULL,
          `plate`         VARCHAR(10)     NOT NULL,
          `model`         VARCHAR(50)     NOT NULL,
          `state`         TINYINT(1)      DEFAULT 1 COMMENT '0=out, 1=garaged, 2=impounded',
          `garage`        VARCHAR(50)     DEFAULT 'legion',
          `job`           VARCHAR(50)     DEFAULT NULL COMMENT 'NULL = personal, otherwise job name',
          `fuel`          INT(3)          DEFAULT 100,
          `body`          FLOAT           DEFAULT 1000.0,
          `engine`        FLOAT           DEFAULT 1000.0,
          `mods`          LONGTEXT        DEFAULT '{}',
          `created_at`    TIMESTAMP       DEFAULT CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`),
          UNIQUE KEY `uk_plate` (`plate`),
          KEY `idx_veh_citizenid` (`citizenid`),
          KEY `idx_veh_state` (`state`)
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

  - action: query_database
    query: |
      CREATE TABLE IF NOT EXISTS `umeverse_stashes` (
          `stash_id`      VARCHAR(100)    NOT NULL,
          `inventory`     LONGTEXT        DEFAULT '[]',
          `updated_at`    TIMESTAMP       DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
          PRIMARY KEY (`stash_id`)
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

  - action: query_database
    query: |
      CREATE TABLE IF NOT EXISTS `umeverse_transactions` (
          `id`            INT(11)         NOT NULL AUTO_INCREMENT,
          `citizenid`     VARCHAR(50)     NOT NULL,
          `type`          VARCHAR(20)     NOT NULL COMMENT 'deposit, withdraw, transfer_in, transfer_out',
          `amount`        INT(11)         NOT NULL DEFAULT 0,
          `description`   VARCHAR(255)    DEFAULT '',
          `created_at`    TIMESTAMP       DEFAULT CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`),
          KEY `idx_tx_citizenid` (`citizenid`),
          KEY `idx_tx_type` (`type`),
          KEY `idx_tx_created` (`created_at`)
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

  - action: query_database
    query: |
      CREATE TABLE IF NOT EXISTS `umeverse_vehicle_keys` (
          `id`            INT(11)         NOT NULL AUTO_INCREMENT,
          `plate`         VARCHAR(10)     NOT NULL,
          `citizenid`     VARCHAR(50)     NOT NULL,
          `granted_at`    TIMESTAMP       DEFAULT CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`),
          UNIQUE KEY `uk_plate_citizen` (`plate`, `citizenid`),
          KEY `idx_key_citizenid` (`citizenid`)
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

  - action: query_database
    query: |
      CREATE TABLE IF NOT EXISTS `umeverse_logs` (
          `id`            INT(11)         NOT NULL AUTO_INCREMENT,
          `source`        VARCHAR(50)     DEFAULT NULL COMMENT 'Player server id or System',
          `citizenid`     VARCHAR(50)     DEFAULT NULL,
          `action`        VARCHAR(50)     NOT NULL COMMENT 'e.g. admin_kick, admin_ban, money_add',
          `details`       TEXT            DEFAULT NULL,
          `metadata`      LONGTEXT        DEFAULT '{}' COMMENT 'JSON: extra context',
          `created_at`    TIMESTAMP       DEFAULT CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`),
          KEY `idx_log_citizenid` (`citizenid`),
          KEY `idx_log_action` (`action`),
          KEY `idx_log_created` (`created_at`)
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

  - action: waste_time
    seconds: 3
    message: "Database tables created. Finalizing setup..."

  ##############################################
  # STEP 5 — Done
  ##############################################
  - action: waste_time
    seconds: 5
    message: |
      Umeverse Framework setup complete!

      NEXT STEPS:
      1. Your ACE owner identifier is set to: {{ownerIdentifier}}
         Change it in server.cfg if needed (type 'status' in console to find yours)
      2. Click "Start Server" in txAdmin — you're ready to play!

      Start your server and connect!

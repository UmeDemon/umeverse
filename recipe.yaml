$engine: 1
$onesync: on

name: Umeverse Framework
version: 1.0.0
author: Umeverse
description: |
  A complete custom FiveM RP framework with economy, inventory, vehicles,
  banking, admin panel, weather sync, appearance editor, and full QBCore/ESX/TMC
  compatibility bridges. Built with Lua + JS NUI on oxmysql.

variables:
  svLicense:
    label: "Server License Key (from keymaster.fivem.net)"
  svHostname:
    label: "Server Name"
    default: "Umeverse RP"
  svMaxClients:
    label: "Max Players"
    default: "64"
  dbConnection:
    label: "MySQL Connection String"
    default: "mysql://root:password@localhost/umeverse?charset=utf8mb4"
  ownerIdentifier:
    label: "Your FiveM License Identifier (type 'status' in console to find)"
    default: "license:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  identifierType:
    label: "Player Identifier Type (license, steam, or discord)"
    default: "license"
  steamWebApiKey:
    label: "Steam Web API Key (required only if using Steam identifier, leave blank otherwise)"
    default: ""
  discordWebhook:
    label: "Discord Webhook URL for admin/server logs (optional, leave blank to disable)"
    default: ""

tasks:
  ##############################################
  # STEP 1 — Download & Extract
  ##############################################
  - action: waste_time
    seconds: 5
    message: "Setting up Umeverse Framework..."

  # ─── Download cfx-server-data (default FiveM resources) ───
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    dest: ./tmp/cfx-server-data

  - action: move_path
    src: ./tmp/cfx-server-data/resources
    dest: ./resources/[cfx-default]

  # ─── Download oxmysql (release build) ───
  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip
    dest: ./tmp/oxmysql.zip

  - action: unzip
    src: ./tmp/oxmysql.zip
    dest: ./resources/oxmysql

  # ─── Download pma-voice ───
  - action: download_file
    url: https://github.com/AvarianKnight/pma-voice/releases/latest/download/pma-voice.zip
    dest: ./tmp/pma-voice.zip

  - action: unzip
    src: ./tmp/pma-voice.zip
    dest: ./resources/pma-voice

  # ─── Download ox_lib ───
  - action: download_file
    url: https://github.com/overextended/ox_lib/releases/latest/download/ox_lib.zip
    dest: ./tmp/ox_lib.zip

  - action: unzip
    src: ./tmp/ox_lib.zip
    dest: ./resources/ox_lib

  # ─── Download Umeverse Framework ───
  - action: download_github
    src: https://github.com/umedemon/umeverse
    ref: main
    dest: ./tmp/umeverse

  - action: move_path
    src: ./tmp/umeverse/umeverse_core
    dest: ./resources/umeverse_core

  - action: move_path
    src: ./tmp/umeverse/umeverse_inventory
    dest: ./resources/umeverse_inventory

  - action: move_path
    src: ./tmp/umeverse/umeverse_banking
    dest: ./resources/umeverse_banking

  - action: move_path
    src: ./tmp/umeverse/umeverse_vehicles
    dest: ./resources/umeverse_vehicles

  - action: move_path
    src: ./tmp/umeverse/umeverse_admin
    dest: ./resources/umeverse_admin

  - action: move_path
    src: ./tmp/umeverse/umeverse_weathersync
    dest: ./resources/umeverse_weathersync

  - action: move_path
    src: ./tmp/umeverse/umeverse_appearance
    dest: ./resources/umeverse_appearance

  - action: move_path
    src: ./tmp/umeverse/umeverse_bridge_qb
    dest: ./resources/umeverse_bridge_qb

  - action: move_path
    src: ./tmp/umeverse/umeverse_bridge_esx
    dest: ./resources/umeverse_bridge_esx

  - action: move_path
    src: ./tmp/umeverse/umeverse_bridge_tmc
    dest: ./resources/umeverse_bridge_tmc

  # ─── Copy SQL file for manual import ───
  - action: move_path
    src: ./tmp/umeverse/sql/umeverse.sql
    dest: ./umeverse.sql

  # ─── Cleanup temp files ───
  - action: remove_path
    dest: ./tmp

  - action: waste_time
    seconds: 3
    message: "Resources downloaded. Configuring framework..."

  ##############################################
  # STEP 2 — Inject configuration values
  ##############################################

  # ─── Set identifier type in core config ───
  - action: replace_string
    file: ./resources/umeverse_core/config.lua
    search: "UmeConfig.IdentifierType = 'license'"
    replace: "UmeConfig.IdentifierType = '{{identifierType}}'"

  # ─── Set Discord webhook in core config ───
  - action: replace_string
    file: ./resources/umeverse_core/config.lua
    search: "UmeConfig.LogWebhook = ''"
    replace: "UmeConfig.LogWebhook = '{{discordWebhook}}'"

  - action: waste_time
    seconds: 2
    message: "Configuration injected. Writing server config..."

  ##############################################
  # STEP 3 — Generate server.cfg
  ##############################################
  - action: write_file
    dest: ./server.cfg
    content: |
      # ╔══════════════════════════════════════════════════════════════╗
      # ║          Umeverse Framework - Server Configuration          ║
      # ║          Generated by txAdmin Recipe                        ║
      # ╚══════════════════════════════════════════════════════════════╝

      # Server Identity
      sv_hostname "{{svHostname}}"
      sv_projectName "{{svHostname}}"
      sv_projectDesc "A custom FiveM RP server powered by Umeverse Framework"
      sets sv_projectName "{{svHostname}}"
      sets tags "roleplay, custom, umeverse"
      sets locale "en-US"
      sv_maxclients {{svMaxClients}}
      sv_endpointPrivacy true
      sv_scriptHookAllowed 0

      # License Key
      sv_licenseKey "{{svLicense}}"

      # Steam Web API Key (leave empty if not using Steam identifiers)
      set steam_webApiKey "{{steamWebApiKey}}"

      # OneSync (REQUIRED for Umeverse)
      set onesync on

      # Database Connection
      set mysql_connection_string "{{dbConnection}}"

      # ─── FiveM Default Resources ───
      ensure mapmanager
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure hardcap

      # ─── Database Driver ───
      ensure oxmysql

      # ─── Optional: Proximity Voice Chat (uncomment to enable) ───
      #ensure pma-voice

      # ─── Optional: Utility Library (uncomment to enable) ───
      #ensure ox_lib

      # ─── Umeverse Framework (ORDER MATTERS) ───
      ensure umeverse_core
      ensure umeverse_inventory
      ensure umeverse_banking
      ensure umeverse_vehicles
      ensure umeverse_admin
      ensure umeverse_weathersync
      ensure umeverse_appearance

      # ─── Compatibility Bridges (uncomment ONE if needed) ───
      #ensure umeverse_bridge_qb    # QBCore / QBox compatibility
      #ensure umeverse_bridge_esx   # ESX compatibility
      #ensure umeverse_bridge_tmc   # TMC (The Mob City) compatibility

      # ─── Your Additional Scripts ───
      # ensure your_script_here

      # ─── Admin Permissions (ACE) ───
      add_ace identifier.{{ownerIdentifier}} umeverse.owner allow
      add_ace umeverse.owner umeverse.superadmin allow
      add_ace umeverse.superadmin umeverse.admin allow
      add_ace umeverse.admin umeverse.moderator allow

  - action: waste_time
    seconds: 2
    message: "Server config written. Finalizing setup..."

  ##############################################
  # STEP 4 — Done
  ##############################################
  - action: waste_time
    seconds: 5
    message: |
      Umeverse Framework setup complete!

      IMPORTANT — DATABASE SETUP:
      Import the file 'umeverse.sql' into your MySQL database manually.
      You can do this with: mysql -u root -p umeverse < umeverse.sql
      Or use phpMyAdmin / HeidiSQL to import it.

      NEXT STEPS:
      1. Import umeverse.sql into your MySQL database
      2. Edit server.cfg to uncomment pma-voice, ox_lib, or a bridge if desired
      3. Your ACE owner identifier is set to: {{ownerIdentifier}}
         Change it in server.cfg if needed (type 'status' in console to find yours)
      4. Click "Start Server" in txAdmin — you're ready to play!

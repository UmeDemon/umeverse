<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appearance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="appearance-container" class="hidden">
        <div class="appear-panel">
            <div class="appear-header">
                <h2 id="panel-title">Clothing Store</h2>
                <div class="rotate-btns">
                    <button class="rotate-btn" onclick="rotatePed(-15)">&#8592;</button>
                    <button class="rotate-btn" onclick="rotatePed(15)">&#8594;</button>
                </div>
            </div>
            <div class="appear-body">
                <!-- Category tabs -->
                <div class="tab-bar" id="tab-bar"></div>

                <!-- Sliders area -->
                <div class="sliders-area" id="sliders-area"></div>
            </div>
            <div class="appear-footer">
                <button class="btn btn-cancel" onclick="cancelAppearance()">Cancel</button>
                <button class="btn btn-save" onclick="saveAppearance()">Save</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

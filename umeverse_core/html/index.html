<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umeverse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Notification Container -->
    <div id="notification-container"></div>

    <!-- Character Select Screen -->
    <div id="character-select" class="screen hidden">
        <div class="char-panel">
            <div class="char-header">
                <h1 id="server-name">Umeverse RP</h1>
                <p>Select your character</p>
            </div>
            <div id="char-list" class="char-list"></div>
            <div class="char-actions">
                <button class="btn btn-primary" id="btn-create-char">Create New Character</button>
            </div>
        </div>
    </div>

    <!-- Character Creation Screen -->
    <div id="character-create" class="screen hidden">
        <div class="char-panel create-panel">
            <div class="char-header">
                <h1>Create Character</h1>
            </div>
            <form id="create-form">
                <div class="form-group">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" placeholder="John" required maxlength="20">
                </div>
                <div class="form-group">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" placeholder="Doe" required maxlength="20">
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="birthdate">Date of Birth</label>
                    <input type="date" id="birthdate" value="1990-01-01">
                </div>
                <div class="form-group">
                    <label for="nationality">Nationality</label>
                    <input type="text" id="nationality" placeholder="American" maxlength="30">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="btn-back-select">Back</button>
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Death Screen -->
    <div id="death-screen" class="screen hidden">
        <div class="death-overlay">
            <div class="death-content">
                <h1>YOU DIED</h1>
                <p id="death-timer">Respawn available in <span id="death-countdown">300</span>s</p>
                <button class="btn btn-danger" id="btn-respawn" disabled>Respawn at Hospital</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
